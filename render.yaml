services:
  - type: web
    name: chakravyuh-api
    runtime: node
    rootDir: .
    plan: starter
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @chakravyuh/api build
    startCommand: node apps/api/dist/server.js
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: chakravyuh-ai-service
    runtime: python
    rootDir: apps/ai-service
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: API_BASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
